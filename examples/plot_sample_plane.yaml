dataset: /Users/liwei/docker-workspace/data/TestOutput2D/gaussian

plot:
  field: state
  component: testsubcyclingmc2_rho
  iteration: 360
  backend: openpmd
  vmin: -2.0
  vmax: +1.6
  output: rho_sample_plane.png

sample_plane:
  origin: [0, 0, 0]
  normal: [0, 0, 1]
  up: [0, 1, 0]
  size: [8, 8]
  resolution: [512, 512]
  interpolation: linear

view:
  xlim: [-4, 4]
  ylim: [-4, 4]
